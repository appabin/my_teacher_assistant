<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{LESSON_TITLE}}</title>
  <style>
    :root { --ink:#182230; --muted:#667085; --line:#d0d5dd; --bg:#f5f7fb; --blue:#2563eb; --green:#047857; --orange:#f59e0b; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
    .shell { min-height:100vh; padding:14px; display:grid; grid-template-rows:auto 1fr; gap:12px; }
    header { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    h1 { margin:0; font-size:28px; letter-spacing:0; }
    .tabs { display:flex; gap:8px; flex-wrap:wrap; }
    button { min-height:40px; border:1px solid var(--line); border-radius:8px; background:#fff; padding:0 14px; font-weight:700; cursor:pointer; }
    button.active { background:var(--blue); color:#fff; border-color:var(--blue); }
    main { display:grid; grid-template-columns:1fr 320px; gap:12px; }
    .stage, aside { border:1px solid var(--line); border-radius:8px; background:#fff; padding:14px; }
    .stage { min-height:520px; display:grid; align-content:center; gap:20px; }
    .fraction-bar { display:grid; grid-template-columns:repeat(var(--denominator),1fr); height:64px; border:3px solid #1f2937; border-radius:8px; overflow:hidden; }
    .piece { border-right:2px solid #1f2937; background:#eef2ff; }
    .piece.on { background:var(--orange); }
    .piece:last-child { border-right:0; }
    .circle-wrap { display:grid; place-items:center; min-height:260px; }
    svg { max-width:380px; width:100%; height:auto; }
    .feedback { border:1px solid var(--line); border-radius:8px; padding:12px; background:#f8fafc; font-size:20px; font-weight:800; }
    aside { display:grid; align-content:start; gap:14px; }
    label { display:grid; gap:8px; color:var(--muted); font-size:14px; }
    input { width:100%; }
    @media (max-width:900px) { main { grid-template-columns:1fr; } h1 { font-size:22px; } }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>{{LESSON_TITLE}}</h1>
      <nav class="tabs">
        <button class="active" data-view="bar">分数条</button>
        <button data-view="circle">圆形等分</button>
        <button data-view="compare">比较大小</button>
      </nav>
    </header>
    <main>
      <section class="stage">
        <div id="visual"></div>
        <div class="feedback" id="feedback"></div>
      </section>
      <aside id="controls"></aside>
    </main>
  </div>
  <script>
    const state = { numerator: 3, denominator: 4, view: "bar" };
    function renderBar() {
      visual.innerHTML = `<div class="fraction-bar" style="--denominator:${state.denominator}">${
        Array.from({length:state.denominator}, (_, i) => `<span class="piece ${i < state.numerator ? "on" : ""}"></span>`).join("")
      }</div>`;
    }
    function renderCircle() {
      const r = 90, cx = 110, cy = 110;
      const parts = Array.from({length:state.denominator}, (_, i) => {
        const a0 = -Math.PI / 2 + i * Math.PI * 2 / state.denominator;
        const a1 = -Math.PI / 2 + (i + 1) * Math.PI * 2 / state.denominator;
        const x0 = cx + r * Math.cos(a0), y0 = cy + r * Math.sin(a0);
        const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
        const large = (a1 - a0) > Math.PI ? 1 : 0;
        return `<path d="M${cx} ${cy} L${x0} ${y0} A${r} ${r} 0 ${large} 1 ${x1} ${y1} Z" fill="${i < state.numerator ? "#f59e0b" : "#eef2ff"}" stroke="#1f2937" stroke-width="3"/>`;
      }).join("");
      visual.innerHTML = `<div class="circle-wrap"><svg viewBox="0 0 220 220">${parts}<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1f2937" stroke-width="4"/></svg></div>`;
    }
    function render() {
      if (state.view === "circle") renderCircle(); else renderBar();
      feedback.textContent = `${state.numerator}/${state.denominator} 表示把同一个整体平均分成 ${state.denominator} 份，取其中 ${state.numerator} 份。`;
      controls.innerHTML = `
        <label>分母：平均分成几份 <input data-key="denominator" type="range" min="2" max="12" value="${state.denominator}"></label>
        <label>分子：取几份 <input data-key="numerator" type="range" min="0" max="${state.denominator}" value="${Math.min(state.numerator, state.denominator)}"></label>
      `;
      controls.querySelectorAll("input").forEach(input => input.addEventListener("input", event => {
        state[event.target.dataset.key] = Number(event.target.value);
        state.numerator = Math.min(state.numerator, state.denominator);
        render();
      }));
    }
    document.querySelectorAll(".tabs button").forEach(button => button.addEventListener("click", () => {
      document.querySelectorAll(".tabs button").forEach(item => item.classList.toggle("active", item === button));
      state.view = button.dataset.view;
      render();
    }));
    render();
  </script>
</body>
</html>
