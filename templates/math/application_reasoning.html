<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{LESSON_TITLE}}</title>
  <style>
    :root { --ink:#182230; --muted:#667085; --line:#d0d5dd; --panel:#fff; --bg:#f3f6fb; --blue:#2563eb; --green:#0f766e; --amber:#b45309; --red:#c2410c; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
    .shell { min-height:100vh; display:grid; grid-template-rows:auto 1fr auto; gap:12px; padding:14px; }
    header { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    h1 { margin:0; font-size:28px; letter-spacing:0; }
    .tabs { display:flex; gap:8px; flex-wrap:wrap; }
    button { min-height:40px; border:1px solid var(--line); border-radius:8px; background:#fff; color:var(--ink); padding:0 14px; font-weight:700; cursor:pointer; }
    button.active { background:var(--blue); border-color:var(--blue); color:#fff; }
    main { display:grid; grid-template-columns:minmax(0,1fr) 340px; gap:12px; min-height:0; }
    .stage { min-height:520px; border:1px solid var(--line); border-radius:8px; background:#fff; padding:16px; display:grid; grid-template-rows:auto 1fr auto; gap:12px; overflow:hidden; }
    .manipulatives { display:grid; grid-template-columns:repeat(auto-fill,minmax(82px,1fr)); align-content:start; gap:10px; min-height:280px; padding:12px; border:1px dashed #aeb8c8; border-radius:8px; background:#f8fafc; }
    .animal { min-height:76px; display:grid; place-items:center; border:1px solid var(--line); border-radius:8px; background:#fff; }
    .animal img { width:54px; height:54px; }
    .metrics { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
    .metric { border:1px solid var(--line); border-radius:8px; padding:10px; background:#f8fafc; }
    .metric strong { display:block; font-size:30px; line-height:1; margin-top:4px; color:var(--blue); }
    aside { border:1px solid var(--line); border-radius:8px; background:#fff; padding:14px; display:grid; align-content:start; gap:14px; }
    label { display:grid; gap:8px; color:var(--muted); font-size:14px; }
    input[type=range], input[type=number] { width:100%; }
    input[type=number] { min-height:38px; border:1px solid var(--line); border-radius:8px; padding:6px 8px; color:var(--ink); }
    .feedback { min-height:64px; border:1px solid var(--line); border-radius:8px; background:#f8fafc; padding:12px; font-size:18px; font-weight:700; }
    .feedback.ok { color:var(--green); background:#ecfdf5; border-color:#99f6e4; }
    .feedback.warn { color:var(--amber); background:#fffbeb; border-color:#fde68a; }
    .feedback.bad { color:var(--red); background:#fff7ed; border-color:#fed7aa; }
    @media (max-width:900px) { main { grid-template-columns:1fr; } h1 { font-size:22px; } .metrics { grid-template-columns:repeat(2,1fr); } .stage { min-height:420px; } }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>{{LESSON_TITLE}}</h1>
      <nav class="tabs" aria-label="探究项目">
        <button class="active" data-view="model">建立模型</button>
        <button data-view="replace">替换观察</button>
        <button data-view="challenge">练习挑战</button>
      </nav>
    </header>
    <main>
      <section class="stage">
        <div class="metrics" id="metrics"></div>
        <div class="manipulatives" id="manipulatives"></div>
        <div class="feedback" id="feedback"></div>
      </section>
      <aside id="controls"></aside>
    </main>
  </div>
  <script>
    const ASSETS = {
      chicken: "/static/assets/math/chicken.svg",
      rabbit: "/static/assets/math/rabbit.svg",
      balance: "/static/assets/math/balance-scale.svg"
    };
    const state = { view: "model", chickens: 3, rabbits: 5, targetHeads: 8, targetLegs: 26 };
    function render() {
      const heads = state.chickens + state.rabbits;
      const legs = state.chickens * 2 + state.rabbits * 4;
      metrics.innerHTML = [
        ["鸡", state.chickens], ["兔", state.rabbits], ["头", heads], ["脚", legs]
      ].map(([name,value]) => `<div class="metric">${name}<strong>${value}</strong></div>`).join("");
      manipulatives.innerHTML = "";
      for (let i = 0; i < state.chickens; i++) manipulatives.insertAdjacentHTML("beforeend", `<div class="animal"><img src="${ASSETS.chicken}" alt="鸡"></div>`);
      for (let i = 0; i < state.rabbits; i++) manipulatives.insertAdjacentHTML("beforeend", `<div class="animal"><img src="${ASSETS.rabbit}" alt="兔"></div>`);
      const diffHeads = state.targetHeads - heads;
      const diffLegs = state.targetLegs - legs;
      feedback.className = "feedback";
      if (diffHeads === 0 && diffLegs === 0) {
        feedback.classList.add("ok");
        feedback.textContent = "完全匹配。把答案代回题目，头数和脚数都对。";
      } else if (diffHeads === 0) {
        feedback.classList.add("warn");
        feedback.textContent = `头数已经对了，脚数还差 ${Math.abs(diffLegs)}。把 1 只鸡换成 1 只兔，脚数会多 2。`;
      } else {
        feedback.classList.add("bad");
        feedback.textContent = `先让总只数等于目标头数，还相差 ${Math.abs(diffHeads)}。`;
      }
      controls.innerHTML = `
        <label>目标头数 <input data-key="targetHeads" type="number" min="0" max="80" value="${state.targetHeads}"></label>
        <label>目标脚数 <input data-key="targetLegs" type="number" min="0" max="240" value="${state.targetLegs}"></label>
        <label>鸡的只数 <input data-key="chickens" type="range" min="0" max="30" value="${state.chickens}"></label>
        <label>兔的只数 <input data-key="rabbits" type="range" min="0" max="30" value="${state.rabbits}"></label>
        <button id="resetBtn">重置</button>
      `;
      controls.querySelectorAll("[data-key]").forEach(input => input.addEventListener("input", event => {
        state[event.target.dataset.key] = Number(event.target.value);
        render();
      }));
      resetBtn.addEventListener("click", () => Object.assign(state, { chickens:3, rabbits:5, targetHeads:8, targetLegs:26 }) && render());
    }
    document.querySelectorAll(".tabs button").forEach(button => button.addEventListener("click", () => {
      document.querySelectorAll(".tabs button").forEach(item => item.classList.toggle("active", item === button));
      state.view = button.dataset.view;
      render();
    }));
    render();
  </script>
</body>
</html>
