<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数学素材预览</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #d7deea;
      --accent: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0;
    }

    p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
    }

    .asset {
      min-height: 184px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .thumb {
      min-height: 120px;
      display: grid;
      place-items: center;
      border: 1px dashed #c6d1e2;
      border-radius: 8px;
      background: #fbfdff;
    }

    img {
      max-width: 112px;
      max-height: 96px;
    }

    strong {
      display: block;
      font-size: 14px;
      line-height: 1.4;
    }

    code {
      display: block;
      margin-top: 4px;
      color: var(--accent);
      font-size: 12px;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>数学素材预览</h1>
        <p>新补充的一组本地 SVG，可直接通过 /static/assets/math/*.svg 引用。</p>
      </div>
    </header>
    <section class="grid" id="grid"></section>
  </main>
  <script>
    const assets = [
      ["小木棍", "wooden-stick.svg"],
      ["小朋友", "child-student.svg"],
      ["两个小朋友", "children-pair.svg"],
      ["小船", "boat-small.svg"],
      ["大船", "boat-large.svg"],
      ["船桨", "oar.svg"],
      ["救生圈", "life-ring.svg"],
      ["座位", "seat.svg"],
      ["公交车", "bus.svg"],
      ["苹果", "apple.svg"],
      ["铅笔", "pencil.svg"],
      ["书本", "book-stack.svg"],
      ["积木", "toy-blocks.svg"],
    ];

    grid.innerHTML = assets.map(([name, file]) => `
      <article class="asset">
        <div class="thumb"><img src="${file}" alt="${name}"></div>
        <div>
          <strong>${name}</strong>
          <code>/static/assets/math/${file}</code>
        </div>
      </article>
    `).join("");
  </script>
</body>
</html>
