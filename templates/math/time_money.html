<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{LESSON_TITLE}}</title>
  <style>
    :root { --ink:#182230; --muted:#667085; --line:#d0d5dd; --bg:#f4f7fb; --blue:#2563eb; --green:#047857; --amber:#b45309; --red:#c2410c; --panel:#fff; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
    .shell { min-height:100vh; padding:14px; display:grid; grid-template-rows:auto 1fr; gap:12px; }
    header { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    h1 { margin:0; font-size:28px; letter-spacing:0; }
    .tabs { display:flex; gap:8px; flex-wrap:wrap; }
    button { min-height:40px; border:1px solid var(--line); border-radius:8px; background:#fff; color:var(--ink); padding:0 14px; font-weight:700; cursor:pointer; }
    button.active { background:var(--blue); border-color:var(--blue); color:#fff; }
    main { display:grid; grid-template-columns:minmax(0,1fr) 330px; gap:12px; min-height:0; }
    .stage, aside { border:1px solid var(--line); border-radius:8px; background:var(--panel); padding:14px; }
    .stage { min-height:520px; display:grid; grid-template-rows:auto 1fr auto; gap:12px; }
    .visual { display:grid; align-content:center; justify-items:center; gap:18px; border:1px dashed #aeb8c8; border-radius:8px; background:#f8fafc; padding:16px; min-height:300px; }
    .clock-row, .money-row { display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:14px; }
    .clock-card, .money-card { min-width:140px; display:grid; justify-items:center; gap:8px; border:1px solid var(--line); border-radius:8px; background:#fff; padding:12px; }
    .clock-card img { width:110px; height:110px; }
    .money-card img { width:118px; height:82px; object-fit:contain; }
    .metric { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .metric div { border:1px solid var(--line); border-radius:8px; background:#f8fafc; padding:10px; }
    .metric strong { display:block; margin-top:4px; font-size:28px; color:var(--blue); }
    .feedback { min-height:64px; border:1px solid var(--line); border-radius:8px; background:#fff; padding:12px; font-size:18px; font-weight:800; }
    aside { display:grid; align-content:start; gap:14px; }
    label { display:grid; gap:8px; color:var(--muted); font-size:14px; }
    input { width:100%; min-height:34px; }
    .hidden { display:none; }
    @media (max-width:900px) { main { grid-template-columns:1fr; } h1 { font-size:22px; } .metric { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>{{LESSON_TITLE}}</h1>
      <nav class="tabs" aria-label="探究项目">
        <button class="active" data-view="elapsed">经过时间</button>
        <button data-view="shopping">购物合计</button>
        <button data-view="change">找零验证</button>
      </nav>
    </header>
    <main>
      <section class="stage">
        <div class="metric" id="metrics"></div>
        <div class="visual" id="visual"></div>
        <div class="feedback" id="feedback"></div>
      </section>
      <aside id="controls"></aside>
    </main>
  </div>
  <script>
    const ASSETS = {
      clock: "/static/assets/math/clock-face.svg",
      coin: "/static/assets/math/yuan-coin.svg",
      note: "/static/assets/math/yuan-note.svg",
      basket: "/static/assets/math/shopping-basket.svg"
    };
    const state = { view:"elapsed", start:8, minutes:45, itemA:12, itemB:8, paid:30 };
    function money(n) { return n.toFixed(2).replace(".00", "") + " 元"; }
    function timeLabel(hour, mins) {
      const total = hour * 60 + mins;
      const h = Math.floor(total / 60) % 24;
      const m = total % 60;
      return `${h}:${String(m).padStart(2, "0")}`;
    }
    function setView(view) {
      state.view = view;
      document.querySelectorAll(".tabs button").forEach(button => button.classList.toggle("active", button.dataset.view === view));
      render();
    }
    function renderElapsed() {
      metrics.innerHTML = `
        <div>开始时间<strong>${timeLabel(state.start, 0)}</strong></div>
        <div>经过时间<strong>${state.minutes} 分</strong></div>
        <div>结束时间<strong>${timeLabel(state.start, state.minutes)}</strong></div>`;
      visual.innerHTML = `<div class="clock-row">
        <div class="clock-card"><img src="${ASSETS.clock}" alt="开始钟面"><strong>${timeLabel(state.start, 0)}</strong></div>
        <div class="clock-card"><strong>向后推 ${state.minutes} 分钟</strong></div>
        <div class="clock-card"><img src="${ASSETS.clock}" alt="结束钟面"><strong>${timeLabel(state.start, state.minutes)}</strong></div>
      </div>`;
      feedback.textContent = `先看整点，再把 ${state.minutes} 分钟分成几十分钟和几分钟来推。`;
      controls.innerHTML = `
        <label>开始整点 <input data-key="start" type="range" min="1" max="12" value="${state.start}"></label>
        <label>经过分钟 <input data-key="minutes" type="range" min="5" max="180" step="5" value="${state.minutes}"></label>`;
    }
    function renderShopping() {
      const total = state.itemA + state.itemB;
      metrics.innerHTML = `
        <div>商品 A<strong>${money(state.itemA)}</strong></div>
        <div>商品 B<strong>${money(state.itemB)}</strong></div>
        <div>合计<strong>${money(total)}</strong></div>`;
      visual.innerHTML = `<div class="money-row">
        <div class="money-card"><img src="${ASSETS.basket}" alt="购物篮"><strong>选两件商品</strong></div>
        <div class="money-card"><img src="${ASSETS.coin}" alt="硬币"><strong>${state.itemA} + ${state.itemB}</strong></div>
        <div class="money-card"><img src="${ASSETS.note}" alt="纸币"><strong>${money(total)}</strong></div>
      </div>`;
      feedback.textContent = `计算总价时，把元和角分清楚。先估一估，再列式 ${state.itemA}+${state.itemB}=${total}。`;
      controls.innerHTML = `
        <label>商品 A 价格 <input data-key="itemA" type="range" min="1" max="50" value="${state.itemA}"></label>
        <label>商品 B 价格 <input data-key="itemB" type="range" min="1" max="50" value="${state.itemB}"></label>`;
    }
    function renderChange() {
      const total = state.itemA + state.itemB;
      const change = state.paid - total;
      metrics.innerHTML = `
        <div>应付<strong>${money(total)}</strong></div>
        <div>付出<strong>${money(state.paid)}</strong></div>
        <div>找回<strong>${money(Math.max(0, change))}</strong></div>`;
      visual.innerHTML = `<div class="money-row">
        <div class="money-card"><img src="${ASSETS.note}" alt="付钱"><strong>付 ${money(state.paid)}</strong></div>
        <div class="money-card"><img src="${ASSETS.basket}" alt="商品"><strong>用去 ${money(total)}</strong></div>
        <div class="money-card"><img src="${ASSETS.coin}" alt="找零"><strong>${change >= 0 ? "找零 " + money(change) : "还差 " + money(Math.abs(change))}</strong></div>
      </div>`;
      feedback.textContent = change >= 0 ? `找零用减法：${state.paid}-${total}=${change}。` : `付的钱不够，还差 ${Math.abs(change)} 元。`;
      controls.innerHTML = `
        <label>商品 A 价格 <input data-key="itemA" type="range" min="1" max="50" value="${state.itemA}"></label>
        <label>商品 B 价格 <input data-key="itemB" type="range" min="1" max="50" value="${state.itemB}"></label>
        <label>付出金额 <input data-key="paid" type="range" min="1" max="100" value="${state.paid}"></label>`;
    }
    function bindControls() {
      controls.querySelectorAll("[data-key]").forEach(input => input.addEventListener("input", event => {
        state[event.target.dataset.key] = Number(event.target.value);
        render();
      }));
    }
    function render() {
      if (state.view === "elapsed") renderElapsed();
      if (state.view === "shopping") renderShopping();
      if (state.view === "change") renderChange();
      bindControls();
    }
    document.querySelectorAll(".tabs button").forEach(button => button.addEventListener("click", () => setView(button.dataset.view)));
    render();
  </script>
</body>
</html>
