<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{LESSON_TITLE}}</title>
  <style>
    :root { --ink:#182230; --muted:#667085; --line:#d0d5dd; --bg:#f4f7fb; --blue:#2563eb; --green:#047857; --amber:#b45309; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
    .shell { min-height:100vh; padding:14px; display:grid; grid-template-rows:auto 1fr; gap:12px; }
    header { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    h1 { margin:0; font-size:28px; letter-spacing:0; }
    .tabs { display:flex; flex-wrap:wrap; gap:8px; }
    button { min-height:40px; border:1px solid var(--line); border-radius:8px; padding:0 14px; background:#fff; font-weight:700; cursor:pointer; }
    button.active { background:var(--blue); border-color:var(--blue); color:#fff; }
    main { display:grid; grid-template-columns:1fr 320px; gap:12px; }
    .stage, aside { border:1px solid var(--line); border-radius:8px; background:#fff; padding:14px; }
    .stage { display:grid; grid-template-rows:auto 1fr auto; gap:12px; min-height:520px; }
    .place-value { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; min-height:280px; }
    .column { border:1px dashed #aeb8c8; border-radius:8px; padding:10px; background:#f8fafc; display:grid; align-content:start; gap:8px; }
    .column h2 { margin:0; font-size:18px; }
    .block-row { display:flex; flex-wrap:wrap; gap:6px; }
    .unit { width:30px; height:30px; border-radius:6px; background:#93c5fd; border:2px solid #1f2937; }
    .rod { width:120px; height:30px; border-radius:6px; background:#bfdbfe; border:2px solid #1f2937; background-image:linear-gradient(90deg,transparent 9%,#1f2937 10%,transparent 11%); background-size:12px 100%; }
    .flat { width:86px; height:86px; border-radius:6px; background:#d1fae5; border:2px solid #1f2937; background-image:linear-gradient(#34d399 1px,transparent 1px),linear-gradient(90deg,#34d399 1px,transparent 1px); background-size:8.6px 8.6px; }
    .equation { min-height:64px; border:1px solid var(--line); border-radius:8px; background:#f8fafc; padding:12px; font-size:22px; font-weight:800; }
    aside { display:grid; align-content:start; gap:14px; }
    label { display:grid; gap:8px; color:var(--muted); font-size:14px; }
    input { width:100%; }
    @media (max-width:900px) { main { grid-template-columns:1fr; } h1 { font-size:22px; } .place-value { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>{{LESSON_TITLE}}</h1>
      <nav class="tabs" aria-label="探究项目">
        <button class="active" data-view="compose">数的组成</button>
        <button data-view="carry">进位观察</button>
        <button data-view="line">数轴跳一跳</button>
      </nav>
    </header>
    <main>
      <section class="stage">
        <div class="equation" id="equation"></div>
        <div class="place-value" id="placeValue"></div>
        <div class="equation" id="feedback"></div>
      </section>
      <aside id="controls"></aside>
    </main>
  </div>
  <script>
    const state = { a: 24, b: 18, view: "compose" };
    function digits(value) { return { hundreds: Math.floor(value / 100), tens: Math.floor(value % 100 / 10), ones: value % 10 }; }
    function cells(label, count, cls) {
      return `<div class="column"><h2>${label}</h2><div class="block-row">${Array.from({length:count}, () => `<span class="${cls}"></span>`).join("")}</div></div>`;
    }
    function render() {
      const sum = state.a + state.b;
      const d = digits(sum);
      equation.textContent = `${state.a} + ${state.b} = ${sum}`;
      placeValue.innerHTML = cells("百位", d.hundreds, "flat") + cells("十位", d.tens, "rod") + cells("个位", d.ones, "unit");
      feedback.textContent = d.ones >= 10 ? "个位满 10，要换成 1 个十。" : "看清每一位，先摆出来，再写算式。";
      controls.innerHTML = `
        <label>第一个数 <input data-key="a" type="range" min="0" max="99" value="${state.a}"></label>
        <label>第二个数 <input data-key="b" type="range" min="0" max="99" value="${state.b}"></label>
      `;
      controls.querySelectorAll("input").forEach(input => input.addEventListener("input", event => {
        state[event.target.dataset.key] = Number(event.target.value);
        render();
      }));
    }
    document.querySelectorAll(".tabs button").forEach(button => button.addEventListener("click", () => {
      document.querySelectorAll(".tabs button").forEach(item => item.classList.toggle("active", item === button));
      state.view = button.dataset.view;
      render();
    }));
    render();
  </script>
</body>
</html>
