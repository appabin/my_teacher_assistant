<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{LESSON_TITLE}}</title>
  <style>
    :root { --ink:#182230; --muted:#667085; --line:#d0d5dd; --bg:#f4f7fb; --blue:#2563eb; --green:#047857; --amber:#b45309; --panel:#fff; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
    .shell { min-height:100vh; padding:14px; display:grid; grid-template-rows:auto 1fr; gap:12px; }
    header { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    h1 { margin:0; font-size:28px; letter-spacing:0; }
    .tabs { display:flex; gap:8px; flex-wrap:wrap; }
    button { min-height:40px; border:1px solid var(--line); border-radius:8px; background:#fff; padding:0 14px; font-weight:700; cursor:pointer; }
    button.active { background:var(--blue); color:#fff; border-color:var(--blue); }
    main { display:grid; grid-template-columns:minmax(0,1fr) 330px; gap:12px; }
    .stage, aside { border:1px solid var(--line); border-radius:8px; background:var(--panel); padding:14px; }
    .stage { min-height:520px; display:grid; grid-template-rows:auto 1fr auto; gap:12px; }
    .metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .metrics div { border:1px solid var(--line); border-radius:8px; background:#f8fafc; padding:10px; }
    .metrics strong { display:block; margin-top:4px; font-size:28px; color:var(--blue); }
    .visual { min-height:320px; border:1px dashed #aeb8c8; border-radius:8px; background:#f8fafc; padding:18px; display:grid; align-content:center; gap:16px; }
    .bars { height:260px; display:grid; grid-template-columns:repeat(4,1fr); gap:14px; align-items:end; border-left:4px solid #1f2937; border-bottom:4px solid #1f2937; padding:10px 16px 0; background:linear-gradient(#e5e7eb 1px,transparent 1px); background-size:100% 52px; }
    .bar { min-height:18px; border:3px solid #1f2937; border-bottom:0; border-radius:8px 8px 0 0; display:grid; place-items:start center; color:#111827; font-weight:800; padding-top:8px; }
    .pictos { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .picto-col { border:1px solid var(--line); border-radius:8px; background:#fff; min-height:180px; padding:10px; display:grid; align-content:end; justify-items:center; gap:6px; }
    .dot { width:30px; height:30px; border-radius:50%; border:3px solid #1f2937; background:#60a5fa; }
    .feedback { min-height:64px; border:1px solid var(--line); border-radius:8px; background:#fff; padding:12px; font-size:18px; font-weight:800; }
    aside { display:grid; align-content:start; gap:14px; }
    label { display:grid; gap:8px; color:var(--muted); font-size:14px; }
    input { width:100%; min-height:34px; }
    @media (max-width:900px) { main { grid-template-columns:1fr; } h1 { font-size:22px; } .metrics { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>{{LESSON_TITLE}}</h1>
      <nav class="tabs">
        <button class="active" data-view="bar">条形统计图</button>
        <button data-view="picto">象形统计图</button>
        <button data-view="question">提出问题</button>
      </nav>
    </header>
    <main>
      <section class="stage">
        <div class="metrics" id="metrics"></div>
        <div class="visual" id="visual"></div>
        <div class="feedback" id="feedback"></div>
      </section>
      <aside id="controls"></aside>
    </main>
  </div>
  <script>
    const state = { view:"bar", a:6, b:9, c:4, d:7 };
    const labels = ["一组", "二组", "三组", "四组"];
    const colors = ["#60a5fa", "#34d399", "#fbbf24", "#fca5a5"];
    function values() { return [state.a, state.b, state.c, state.d]; }
    function setView(view) {
      state.view = view;
      document.querySelectorAll(".tabs button").forEach(button => button.classList.toggle("active", button.dataset.view === view));
      render();
    }
    function renderMetrics() {
      const list = values();
      const max = Math.max(...list);
      const min = Math.min(...list);
      const sum = list.reduce((a, b) => a + b, 0);
      metrics.innerHTML = `<div>最多<strong>${max}</strong></div><div>最少<strong>${min}</strong></div><div>合计<strong>${sum}</strong></div>`;
      return { list, max, min, sum };
    }
    function renderBars() {
      const { list, max } = renderMetrics();
      visual.innerHTML = `<div class="bars">${list.map((value, index) => `<div class="bar" style="height:${Math.max(12, value / Math.max(1, max) * 220)}px;background:${colors[index]}">${value}<br>${labels[index]}</div>`).join("")}</div>`;
      feedback.textContent = `先看每根条的高度，再比较最多和最少，相差 ${max - Math.min(...list)}。`;
    }
    function renderPicto() {
      const { list } = renderMetrics();
      visual.innerHTML = `<div class="pictos">${list.slice(0,3).map((value, index) => `<div class="picto-col">${Array.from({length:value}, () => `<span class="dot" style="background:${colors[index]}"></span>`).join("")}<strong>${labels[index]}：${value}</strong></div>`).join("")}</div>`;
      feedback.textContent = "象形统计图要先看清楚：一个图形表示几个数量。这里一个圆点表示 1。";
    }
    function renderQuestion() {
      const { list, sum } = renderMetrics();
      const diff = Math.max(...list) - Math.min(...list);
      visual.innerHTML = `<div class="pictos"><div class="picto-col"><img src="/static/assets/math/bar-chart.svg" alt="条形统计图" width="120"></div><div class="picto-col"><img src="/static/assets/math/pictograph.svg" alt="象形统计图" width="120"></div><div class="picto-col"><img src="/static/assets/math/line-chart.svg" alt="折线统计图" width="120"></div></div>`;
      feedback.textContent = `可以提出问题：一共有多少？最多比最少多多少？这里合计 ${sum}，最多和最少相差 ${diff}。`;
    }
    function bindControls() {
      controls.innerHTML = `
        <label>一组 <input data-key="a" type="range" min="0" max="12" value="${state.a}"></label>
        <label>二组 <input data-key="b" type="range" min="0" max="12" value="${state.b}"></label>
        <label>三组 <input data-key="c" type="range" min="0" max="12" value="${state.c}"></label>
        <label>四组 <input data-key="d" type="range" min="0" max="12" value="${state.d}"></label>`;
      controls.querySelectorAll("[data-key]").forEach(input => input.addEventListener("input", event => {
        state[event.target.dataset.key] = Number(event.target.value);
        render();
      }));
    }
    function render() {
      if (state.view === "bar") renderBars();
      if (state.view === "picto") renderPicto();
      if (state.view === "question") renderQuestion();
      bindControls();
    }
    document.querySelectorAll(".tabs button").forEach(button => button.addEventListener("click", () => setView(button.dataset.view)));
    render();
  </script>
</body>
</html>
